name: smart-seat-reservation

services:
  redis:
    image: redis:7.4-alpine
    container_name: smart-seat-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: smart-seat-backend:local
    container_name: smart-seat-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_PORT: 18080
      MYSQL_HOST: smart-seat-mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128,172.16.0.0/12}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
      - smart-seat-db

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    image: smart-seat-frontend:local
    container_name: smart-seat-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_HTTP_PORT:-18081}:80"
    networks:
      - app

volumes:
  redis-data:

networks:
  app:
  smart-seat-db:
    external: true
    name: ${MYSQL_DOCKER_NETWORK:-smart-seat-db_default}
